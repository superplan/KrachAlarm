name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # PWA auf GitHub Pages veröffentlichen
  pages:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload www folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: www
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  # Android-APK bauen und als Release veröffentlichen
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk KrachAlarm.apk

      - name: Upload APK (Artefakt)
        uses: actions/upload-artifact@v4
        with:
          name: KrachAlarm-APK
          path: KrachAlarm.apk
          if-no-files-found: error

      - name: Veröffentlichen als Release (fester Download-Link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Krach Alarm – neueste APK
          body: |
            Aktuelle Version der Krach-Alarm-App.

            **Direkter Download (am Handy öffnen):**
            https://github.com/superplan/KrachAlarm/releases/latest/download/KrachAlarm.apk
          files: KrachAlarm.apk
