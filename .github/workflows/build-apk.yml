name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "www/**"
      - "android/**"
      - "capacitor.config.json"
      - "package.json"
      - ".github/workflows/build-apk.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk KrachAlarm.apk

      - name: Upload APK (Artefakt)
        uses: actions/upload-artifact@v4
        with:
          name: KrachAlarm-APK
          path: KrachAlarm.apk
          if-no-files-found: error

      - name: Veröffentlichen als Release (fester Download-Link)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Krach Alarm – neueste APK
          body: |
            Aktuelle Version der Krach-Alarm-App.

            **Direkter Download (am Handy öffnen):**
            https://github.com/superplan/KrachAlarm/releases/latest/download/KrachAlarm.apk
          files: KrachAlarm.apk
